<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">RevFlow setup wizard mockup</title>
  <desc id="desc">Illustrated mockup of the RevFlow setup wizard for mapping Jira fields, statuses, currencies, features, email, and access.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#e8f0ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#14211e" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="620" rx="32" fill="url(#bg)"/>
  <rect x="38" y="38" width="844" height="544" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="38" y="38" width="844" height="64" rx="22" fill="#173d38"/>
  <rect x="38" y="78" width="844" height="24" fill="#173d38"/>
  <text x="74" y="79" fill="#fffdf6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850">RevFlow setup wizard</text>
  <text x="706" y="79" fill="#cde0dd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="750">Step 3 of 10</text>

  <rect x="74" y="136" width="188" height="378" rx="16" fill="#f6f8fb" stroke="#d9e4e1"/>
  <text x="98" y="172" fill="#173d38" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">Configuration</text>
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="760">
    <rect x="96" y="198" width="134" height="28" rx="14" fill="#e9f2f1"/>
    <text x="112" y="217" fill="#236c69">Welcome</text>
    <rect x="96" y="238" width="134" height="28" rx="14" fill="#e9f2f1"/>
    <text x="112" y="257" fill="#236c69">Jira fields</text>
    <rect x="96" y="278" width="146" height="30" rx="15" fill="#173d38"/>
    <text x="112" y="298" fill="#fffdf6">Statuses &amp; types</text>
    <rect x="96" y="320" width="116" height="28" rx="14" fill="#f3e4d0"/>
    <text x="112" y="339" fill="#8a551d">Company</text>
    <rect x="96" y="360" width="116" height="28" rx="14" fill="#f3e4d0"/>
    <text x="112" y="379" fill="#8a551d">Currency</text>
    <rect x="96" y="400" width="126" height="28" rx="14" fill="#eef1f3"/>
    <text x="112" y="419" fill="#5b6661">Quote items</text>
    <rect x="96" y="440" width="98" height="28" rx="14" fill="#eef1f3"/>
    <text x="112" y="459" fill="#5b6661">Access</text>
  </g>

  <text x="304" y="162" fill="#17201d" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Map RevFlow to your Jira workflow</text>
  <text x="304" y="194" fill="#5b6661" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">Statuses, issue types, and work buckets control reporting.</text>

  <rect x="304" y="230" width="242" height="112" rx="14" fill="#fffdf6" stroke="#d9e4e1"/>
  <text x="328" y="264" fill="#173d38" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Quote statuses</text>
  <rect x="328" y="286" width="70" height="26" rx="13" fill="#e9f2f1"/>
  <text x="344" y="304" fill="#236c69" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Draft</text>
  <rect x="410" y="286" width="64" height="26" rx="13" fill="#edf1fb"/>
  <text x="427" y="304" fill="#315d92" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Sent</text>
  <rect x="486" y="286" width="86" height="26" rx="13" fill="#eef7ed"/>
  <text x="501" y="304" fill="#2f6b35" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Accepted</text>

  <rect x="584" y="230" width="242" height="112" rx="14" fill="#fffdf6" stroke="#d9e4e1"/>
  <text x="608" y="264" fill="#173d38" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Work buckets</text>
  <rect x="608" y="286" width="90" height="26" rx="13" fill="#f3e4d0"/>
  <text x="627" y="304" fill="#8a551d" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Order</text>
  <rect x="710" y="286" width="72" height="26" rx="13" fill="#e9f2f1"/>
  <text x="730" y="304" fill="#236c69" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">WIP</text>
  <rect x="608" y="318" width="104" height="26" rx="13" fill="#edf1fb"/>
  <text x="622" y="336" fill="#315d92" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Invoiceable</text>

  <rect x="304" y="374" width="522" height="94" rx="14" fill="#f6f8fb" stroke="#d9e4e1"/>
  <text x="328" y="408" fill="#173d38" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Feature flags</text>
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="760">
    <rect x="328" y="428" width="132" height="24" rx="12" fill="#e9f2f1"/>
    <text x="344" y="445" fill="#236c69">Recurring quotes</text>
    <rect x="474" y="428" width="142" height="24" rx="12" fill="#e9f2f1"/>
    <text x="490" y="445" fill="#236c69">Coverage checks</text>
    <rect x="630" y="428" width="126" height="24" rx="12" fill="#e9f2f1"/>
    <text x="646" y="445" fill="#236c69">Billing exports</text>
  </g>

  <rect x="650" y="504" width="176" height="42" rx="9" fill="#173d38"/>
  <text x="696" y="531" fill="#fffdf6" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">Finish setup</text>
</svg>
